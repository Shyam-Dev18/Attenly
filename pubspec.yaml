name: attenly_app
description: "Attenly - Smart offline attendance tracker for students."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # State Management
  flutter_riverpod: ^2.6.1
  # Navigation
  go_router: ^14.6.3
  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  table_calendar: ^3.2.0
  # Notifications
  flutter_local_notifications: ^19.0.0
  # Export
  excel: ^4.0.6
  # Utils
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  share_plus: ^10.1.4
  permission_handler: ^12.0.0+1
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#6C63FF"
    theme_color: "#6C63FF"
