name: Build and Release APKs

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.11.3"
          channel: "stable"

      - name: Get dependencies
        run: flutter pub get

      - name: Build Release APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename APK files
        run: |
          cd build/app/outputs/apk/release
          VERSION=$(grep "version:" ../../../../../pubspec.yaml | head -1 | cut -d' ' -f2 | cut -d'+' -f1)
          mv app-arm64-v8a-release.apk attenly-v${VERSION}-arm64.apk
          mv app-armeabi-v7a-release.apk attenly-v${VERSION}-armv7.apk
          mv app-x86_64-release.apk attenly-v${VERSION}-x86_64.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/apk/release/attenly-v*.apk
          body: |
            ## Attenly App Release

            ### Available Downloads

            - **attenly-v*-arm64.apk** - For modern Android devices (ARM64)
            - **attenly-v*-armv7.apk** - For older 32-bit Android devices (ARM v7)
            - **attenly-v*-x86_64.apk** - For Android emulators

            ### Installation Instructions

            1. Download the appropriate APK for your device
            2. Enable "Install from Unknown Sources" in Security settings
            3. Open the APK file and tap Install
            4. Grant necessary permissions when prompted

            For detailed instructions, see [releases/README.md](https://github.com/${{ github.repository }}/blob/main/releases/README.md)
